version: '3.8'

services:
  graph-db:
    network_mode: "host"
    image: ontotext/graphdb:10.6.4
    #ghcr.io/maastrichtu-cds/fair_tools_docker-graphdb/docker-graphdb:latest
    container_name: graphdb
    ports:
      - "7200:7200"
    restart: unless-stopped

  fastapi-app:
    network_mode: "host"
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - graph-db